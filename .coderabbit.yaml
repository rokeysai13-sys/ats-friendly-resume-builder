# CodeRabbit Configuration
# For more information, visit https://docs.coderabbit.ai/getting-started/configuration

review:
  auto_review: true
  base_branch: "main"
  profile: "chill"
  language: "en-US"

chat:
  enabled: true

instructions: |
  Please focus on the following during the review:
  1. Adherence to Python type hinting and Flask best practices.
  2. Frontend performance, especially the 3D tilt animation logic.
  3. Cleanliness of the new ATS Match interface implementation.
  4. Consistency with the "Digital Obsidian" glassmorphic design system.
